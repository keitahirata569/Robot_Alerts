<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>製番スキャン</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  padding: 16px;
  background: #f0f2f5;
}

h2 {
  margin-bottom: 4px; /* 説明書きとの間隔を調整 */
}

/* 説明書きのスタイル */
.description {
  font-size: 13px;
  color: #666;
  margin-bottom: 16px;
}

button {
  width: 100%;
  padding: 16px;
  margin: 8px 0;
  font-size: 18px;
  border: none;
  border-radius: 12px;
  color: white;
  cursor: pointer;
}

.blue { background: #0078d4; }
.orange { background: #f39c12; }
.red { background: #d9534f; }

#reader {
  width: 300px;
  margin: 10px auto;
}

.list {
  margin-top: 20px;
  text-align: left;
}

.item {
  background: white;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 8px;

  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px; /* テキストとボタンの間に隙間を作る */
}

/* 読み取ったテキスト側の設定 */
.item span {
  flex: 1; /* 残りの幅をすべて使う */
  word-break: break-all; /* 長い英数字でも改行させる */
}

/* 削除ボタンを横幅1/4（25%）にして右側に固定 */
.delete {
  background: #d9534f;
  color: white;
  border: none;
  padding: 10px 0;
  border-radius: 6px;
  width: 25%;
  flex-shrink: 0; /* ボタンが潰れないように固定 */
  font-size: 14px;
}
</style>
</head>

<body>

<h2>製番読み取り</h2>
<p class="description">製番QRを読み取り(複数可)メール送信してください</p>

<button class="blue" onclick="startScan()">📷 製番を読み取る</button>
<button class="red" onclick="sendMail()">📧 メール送信</button>
<button class="orange" onclick="location.reload()">🔄 リセット</button>

<div id="reader"></div>

<div class="list" id="list"></div>

<script>
let scanner = null;
let results = [];

function startScan() {
  if (scanner) return;

  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (decodedText) => {
      scanner.stop().then(() => {
        scanner.clear();
        scanner = null;
      });

      if (!results.includes(decodedText)) {
        results.push(decodedText);
        renderList();
      }

      if (navigator.vibrate) navigator.vibrate(100);
    }
  ).catch(err => {
    alert("カメラ起動失敗: " + err);
    scanner = null;
  });
}

function renderList() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  results.forEach((text, index) => {
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <span>${index + 1}. ${text}</span>
      <button class="delete" onclick="deleteItem(${index})">削除</button>
    `;

    list.appendChild(div);
  });
}

function deleteItem(index) {
  if (!confirm("削除しますか？")) return;
  results.splice(index, 1);
  renderList();
}

function sendMail() {
  if (results.length === 0) {
    alert("製番がありません");
    return;
  }

  if (!confirm("メールを作成しますか？")) return;

  let listText = results.map((r, i) => (i + 1) + ". " + r).join("\n");

  let body =
`お疲れ様です
下記製番を安田倉庫へ納品しました。

${listText}

以上、宜しくお願いいたします。
※本メールアドレスに返信いただいても対応できませんので、ご了承ください。`;

  let to = "ki-hirata@toyodensei.co.jp";
  let cc = "ki-hirata@toyodensei.co.jp";
  let subject = "安田倉庫納品連絡";

  let url = "mailto:" + to +
    "?cc=" + encodeURIComponent(cc) +
    "?subject=" + encodeURIComponent(subject) +
    "&body=" + encodeURIComponent(body);

  location.href = url;

  setTimeout(() => {
    location.reload();
  }, 500);
}
</script>

</body>
</html>
