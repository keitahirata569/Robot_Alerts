<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>納品連絡</title>

  <link rel="icon" href="./favicon.ico">
  <link rel="apple-touch-icon" href="./icon.png">

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: sans-serif;
      background: #f0f2f5;
    }

    body {
      padding: 16px;
      box-sizing: border-box;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
    }

    h2 {
      text-align: center;
      font-size: 26px;
      margin: 0 0 8px;
    }

    .sub {
      text-align: center;
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
    }

    button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 18px;
      margin: 10px 0;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      color: white;
      cursor: pointer;
    }

    button img {
      width: 24px;
      height: 24px;
      filter: brightness(0) invert(1);
    }

    .blue { background: #0078d4; }
    .red { background: #d9534f; }
    .orange { background: #f39c12; }

    .list {
      margin-top: 15px;
    }

    .item {
      background: #f8f9fa;
      padding: 14px;
      padding-right: 95px;
      border-radius: 10px;
      margin-bottom: 10px;
      position: relative;
      display: flex;
      align-items: center;
    }

    .item span {
      font-size: 16px;
      word-break: break-all;
    }

    .delete {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 25%;
      max-width: 50px;
      height: 36px;
      background: #d9534f;
      color: white;
      font-size: 13px;
      border: none;
      border-radius: 8px;
      padding: 0;
      cursor: pointer;
    }

    /* ===== カメラ ===== */

    #scanner-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 1000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #reader-container {
      position: relative;
      width: 260px;
      height: 260px;
      background: white;
      border-radius: 16px;
      overflow: hidden;
    }

    #reader {
      width: 100%;
      height: 100%;
    }

    /* ★枠太く */
    #qr-highlight {
      position: absolute;
      inset: 6px;
      border: 8px solid white;
      box-sizing: border-box;
      pointer-events: none;
    }

    #qr-highlight.yellow {
      border-color: #ffd500;
    }

    #qr-highlight.red {
      border-color: #ff3b30;
    }

    .cancel-area {
      width: 80%;
      margin-top: 20px;
      position: relative;
      z-index: 10;
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>納品連絡</h2>
    <div class="sub">
      製番QRを読み取り、メール送信してください<br>（複数可）
    </div>

    <button class="blue" onclick="startScan()">
      <img src="camera.png" alt=""> 製番を読み取る
    </button>

    <button class="red" onclick="sendMail()">
      <img src="mail.png" alt=""> メール送信
    </button>

    <button class="orange" onclick="location.reload()">
      <img src="refresh.png" alt=""> リセット
    </button>

    <div class="list" id="list"></div>
  </div>

  <div id="scanner-overlay">
    <div id="reader-container">
      <div id="reader"></div>
      <div id="qr-highlight"></div>
    </div>
    <div class="cancel-area">
      <button class="red" onclick="stopScan()">閉じる</button>
    </div>
  </div>

<script>
  let scanner = null;
  let results = [];
  let lock = false;

  function startScan() {
    document.getElementById("scanner-overlay").style.display = "flex";
    if (scanner) return;

    scanner = new Html5Qrcode("reader");
    scanner.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: 250 },
      onScanSuccess
    );
  }

  function onScanSuccess(text) {
    if (lock) return;
    lock = true;

    if (!results.includes(text)) {
      // 新規
      results.push(text);
      renderList();
      playBeep(1);
      highlightQr("yellow");

      if (navigator.vibrate) navigator.vibrate(100);

    } else {
      // 重複
      playBeep(2);
      highlightQr("red");

      if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
    }

    setTimeout(() => lock = false, 800);
  }

  function stopScan() {
    if (!scanner) {
      document.getElementById("scanner-overlay").style.display = "none";
      return;
    }
    scanner.stop().then(() => {
      scanner.clear();
      scanner = null;
      document.getElementById("scanner-overlay").style.display = "none";
    });
  }

  function renderList() {
    const list = document.getElementById("list");
    list.innerHTML = "";
    results.forEach((r, i) => {
      list.innerHTML += `
        <div class="item">
          <span>${r}</span>
          <button class="delete" onclick="removeItem(${i})">削除</button>
        </div>
      `;
    });
  }

  function removeItem(i) {
    results.splice(i, 1);
    renderList();
  }

  function sendMail() {
    if (!results.length) {
      alert("製番がありません");
      return;
    }

    const body =
`お疲れ様です
下記の製番を安田倉庫へ納品しました。

${results.join("\n")}

以上、宜しくお願いいたします。`;

    location.href =
      "mailto:ki-hirata@toyodensei.co.jp" +
      "?subject=" + encodeURIComponent("安田倉庫納品連絡") +
      "&body=" + encodeURIComponent(body);
  }

  function playBeep(count = 1) {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();

    for (let i = 0; i < count; i++) {
      const osc = ctx.createOscillator();
      osc.frequency.value = 1000;
      osc.connect(ctx.destination);

      const start = ctx.currentTime + i * 0.2;
      osc.start(start);
      osc.stop(start + 0.1);
    }
  }

  function highlightQr(color) {
    const box = document.getElementById("qr-highlight");

    box.classList.remove("yellow", "red");

    if (color === "red") {
      box.classList.add("red");
    } else {
      box.classList.add("yellow");
    }

    setTimeout(() => {
      box.classList.remove("yellow", "red");
    }, 500);
  }
</script>
</body>
</html>
